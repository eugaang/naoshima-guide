<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 480" role="img">
  <title>나오시마 교통편 안내</title>
  <desc>다카마츠항에서 나오시마까지의 페리 경로와, 섬 내 지중미술관까지의 갈 때/올 때 경로</desc>

  <rect width="500" height="480" fill="#FFF5F3" rx="8"/>

  <!-- ===== Section 1: 다카마츠 → 나오시마 ===== -->
  <text x="250" y="28" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2D3A5E">다카마츠항 → 나오시마</text>

  <rect x="30" y="48" width="110" height="44" rx="10" fill="#2CBAB0" opacity="0.9"/>
  <text x="85" y="67" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#FFF5F3">다카마츠항</text>
  <text x="85" y="82" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FFF5F3" opacity="0.85">12:40 출발</text>

  <line x1="140" y1="70" x2="310" y2="70" stroke="#2CBAB0" stroke-width="2.5" stroke-dasharray="8,4"/>
  <polygon points="310,70 302,65 302,75" fill="#2CBAB0"/>
  <text x="225" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#2CBAB0">페리 약 50분</text>
  <text x="225" y="95" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#5A5A5A">편도 530엔 / 시코쿠 페리</text>

  <rect x="310" y="48" width="160" height="44" rx="10" fill="#2D3A5E"/>
  <text x="390" y="67" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#FFF5F3">미야노우라항</text>
  <text x="390" y="82" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E8637A">13:30 도착 · 빨간호박</text>

  <!-- ===== Divider ===== -->
  <line x1="30" y1="115" x2="470" y2="115" stroke="#F0D8D4" stroke-width="1"/>

  <!-- ===== Section 2: 갈 때 ===== -->
  <text x="250" y="140" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#2D3A5E">갈 때 — 미야노우라항 → 지중미술관</text>

  <!-- Step 1 -->
  <circle cx="60" cy="185" r="22" fill="#E8637A" stroke="#FFF5F3" stroke-width="2"/>
  <text x="60" y="181" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#FFF5F3">미야노</text>
  <text x="60" y="191" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#FFF5F3">우라항</text>
  <text x="60" y="218" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#2D3A5E">13:45</text>
  <text x="60" y="230" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#5A5A5A">버스 탑승</text>

  <!-- Arrow -->
  <line x1="82" y1="185" x2="158" y2="185" stroke="#2D3A5E" stroke-width="2"/>
  <polygon points="158,185 151,180 151,190" fill="#2D3A5E"/>
  <text x="120" y="177" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#5A5A5A">버스 15분</text>
  <text x="120" y="200" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#5A5A5A">100엔</text>

  <!-- Step 2 -->
  <circle cx="185" cy="185" r="22" fill="#E8637A" stroke="#FFF5F3" stroke-width="2"/>
  <text x="185" y="181" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#FFF5F3">츠츠지소</text>
  <text x="185" y="191" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#FFF5F3">つつじ荘</text>
  <text x="185" y="218" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#E8637A">14:00</text>
  <text x="185" y="230" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#5A5A5A">셔틀 환승</text>

  <!-- Arrow -->
  <line x1="207" y1="185" x2="308" y2="185" stroke="#2D3A5E" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="308,185 301,180 301,190" fill="#2D3A5E"/>
  <text x="258" y="177" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#5A5A5A">무료 셔틀 10분</text>

  <!-- Step 3 -->
  <circle cx="335" cy="185" r="24" fill="#2D3A5E" stroke="#E8637A" stroke-width="3"/>
  <text x="335" y="182" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#FFF5F3">지중</text>
  <text x="335" y="193" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#FFF5F3">미술관</text>
  <text x="335" y="220" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#2D3A5E">14:20</text>
  <text x="335" y="232" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#5A5A5A">관람 시작</text>

  <!-- Total time badge -->
  <rect x="390" y="172" width="90" height="28" rx="14" fill="#2D3A5E" opacity="0.1"/>
  <text x="435" y="191" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#2D3A5E">총 약 35분</text>

  <!-- ===== Divider ===== -->
  <line x1="30" y1="252" x2="470" y2="252" stroke="#F0D8D4" stroke-width="1"/>

  <!-- ===== Section 3: 올 때 ===== -->
  <text x="250" y="277" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#2D3A5E">올 때 — 지중미술관 → 미야노우라항</text>

  <!-- Step 1 -->
  <circle cx="60" cy="322" r="24" fill="#2D3A5E" stroke="#E8637A" stroke-width="3"/>
  <text x="60" y="319" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#FFF5F3">지중</text>
  <text x="60" y="330" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#FFF5F3">미술관</text>
  <text x="60" y="357" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#2D3A5E">16:00</text>
  <text x="60" y="369" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#5A5A5A">셔틀 탑승</text>

  <!-- Arrow -->
  <line x1="84" y1="322" x2="158" y2="322" stroke="#2D3A5E" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="158,322 151,317 151,327" fill="#2D3A5E"/>
  <text x="121" y="314" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#5A5A5A">무료 셔틀 10분</text>

  <!-- Step 2 -->
  <circle cx="185" cy="322" r="22" fill="#E8637A" stroke="#FFF5F3" stroke-width="2"/>
  <text x="185" y="318" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#FFF5F3">츠츠지소</text>
  <text x="185" y="328" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#FFF5F3">노란호박🎃</text>
  <text x="185" y="355" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#E8637A">16:10</text>
  <text x="185" y="367" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#5A5A5A">사진 촬영!</text>

  <!-- Arrow -->
  <line x1="207" y1="322" x2="308" y2="322" stroke="#2D3A5E" stroke-width="2"/>
  <polygon points="308,322 301,317 301,327" fill="#2D3A5E"/>
  <text x="258" y="314" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#5A5A5A">버스 15분</text>
  <text x="258" y="337" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#5A5A5A">100엔</text>

  <!-- Step 3 -->
  <circle cx="335" cy="322" r="22" fill="#E8637A" stroke="#FFF5F3" stroke-width="2"/>
  <text x="335" y="318" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#FFF5F3">미야노</text>
  <text x="335" y="328" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#FFF5F3">우라항</text>
  <text x="335" y="355" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#2D3A5E">16:40</text>
  <text x="335" y="367" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#5A5A5A">기념품+대기</text>

  <!-- Ferry departure -->
  <line x1="357" y1="322" x2="398" y2="322" stroke="#2CBAB0" stroke-width="2"/>
  <polygon points="398,322 391,317 391,327" fill="#2CBAB0"/>

  <rect x="398" y="306" width="85" height="34" rx="10" fill="#2CBAB0" opacity="0.9"/>
  <text x="440" y="321" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFF5F3">17:00 출발</text>
  <text x="440" y="333" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#FFF5F3">→ 다카마츠</text>

  <!-- ===== Bottom tip ===== -->
  <rect x="30" y="400" width="440" height="65" rx="8" fill="#E8637A" opacity="0.08" stroke="#E8637A" stroke-width="1"/>
  <text x="50" y="420" font-family="sans-serif" font-size="11" fill="#2D3A5E" font-weight="bold">⚠️ 주의사항</text>
  <text x="50" y="438" font-family="sans-serif" font-size="9" fill="#5A5A5A">• 마을버스 배차 30분~1시간 간격. 시간표 반드시 사전 확인</text>
  <text x="50" y="453" font-family="sans-serif" font-size="9" fill="#5A5A5A">• 15명 단체 — 소형 버스라 2그룹 분산 탑승 필요할 수 있음</text>
</svg>
