<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 480" role="img">
  <title>선교 현황 통계 인포그래픽</title>
  <desc>시코쿠와 세토내해 지역의 선교적 맥락을 보여주는 통계</desc>

  <rect width="360" height="480" fill="#FFF5F3" rx="8"/>

  <text x="180" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1A1A1A">시코쿠 · 세토내해 선교 현황</text>

  <!-- Row 1 -->
  <!-- Stat 1: 88개소 순례길 -->
  <g transform="translate(95,75)">
    <circle cx="0" cy="25" r="35" fill="#2D3A5E" opacity="0.08"/>
    <circle cx="0" cy="8" r="3.5" fill="#2D3A5E"/>
    <line x1="0" y1="12" x2="0" y2="26" stroke="#2D3A5E" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="16" x2="-6" y2="22" stroke="#2D3A5E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="16" x2="6" y2="22" stroke="#2D3A5E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="26" x2="-4" y2="35" stroke="#2D3A5E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="26" x2="4" y2="35" stroke="#2D3A5E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7" y1="14" x2="10" y2="36" stroke="#2D3A5E" stroke-width="1.5" stroke-linecap="round"/>

    <text x="0" y="52" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5A5A5A">시코쿠 순례길</text>
    <text x="0" y="76" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="bold" fill="#2D3A5E">88</text>
    <text x="0" y="92" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5A5A5A">개소</text>
    <rect x="-55" y="102" width="110" height="32" rx="6" fill="#2D3A5E" opacity="0.06"/>
    <text x="0" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5A5A5A">1,200년 역사</text>
    <text x="0" y="129" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5A5A5A">1,200km 순례 코스</text>
  </g>

  <!-- Stat 2: 세토내해 700+ 섬 -->
  <g transform="translate(265,75)">
    <circle cx="0" cy="25" r="35" fill="#2CBAB0" opacity="0.08"/>
    <path d="M-12,18 Q-6,8 0,16 Q6,8 12,18" fill="#2CBAB0" opacity="0.5"/>
    <path d="M-15,24 Q-8,18 0,24 Q8,18 15,24" stroke="#2CBAB0" stroke-width="1.5" fill="none"/>
    <path d="M-15,30 Q-8,24 0,30 Q8,24 15,30" stroke="#2CBAB0" stroke-width="1.5" fill="none"/>

    <text x="0" y="52" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5A5A5A">세토내해</text>
    <text x="0" y="76" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="bold" fill="#2CBAB0">700+</text>
    <text x="0" y="92" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5A5A5A">섬</text>
    <rect x="-55" y="102" width="110" height="32" rx="6" fill="#2CBAB0" opacity="0.06"/>
    <text x="0" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5A5A5A">약 150개 유인도</text>
    <text x="0" y="129" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5A5A5A">복음이 닿기 어려운 섬들</text>
  </g>

  <!-- Row 2 -->
  <!-- Stat 3: 고령화율 -->
  <g transform="translate(95,285)">
    <circle cx="0" cy="25" r="35" fill="#E8637A" opacity="0.08"/>
    <circle cx="0" cy="22" r="16" fill="none" stroke="#E8E4E0" stroke-width="5"/>
    <circle cx="0" cy="22" r="16" fill="none" stroke="#E8637A" stroke-width="5"
            stroke-dasharray="33.2 100.5" stroke-dashoffset="25.1"
            transform="rotate(-90 0 22)"/>

    <text x="0" y="52" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5A5A5A">카가와현 고령화율</text>
    <text x="-2" y="78" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="bold" fill="#E8637A">~33</text>
    <text x="30" y="78" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#E8637A">%</text>
    <text x="0" y="94" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5A5A5A">65세 이상</text>
    <rect x="-55" y="102" width="110" height="32" rx="6" fill="#E8637A" opacity="0.06"/>
    <text x="0" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5A5A5A">일본 최고 수준 고령화</text>
    <text x="0" y="129" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5A5A5A">돌봄 사역의 필요</text>
  </g>

  <!-- Stat 4: 나오시마 인구 -->
  <g transform="translate(265,285)">
    <circle cx="0" cy="25" r="35" fill="#2D3A5E" opacity="0.08"/>
    <circle cx="-8" cy="12" r="3" fill="#2D3A5E" opacity="0.5"/>
    <rect x="-12" y="16" width="8" height="10" rx="3" fill="#2D3A5E" opacity="0.5"/>
    <circle cx="0" cy="8" r="4" fill="#2D3A5E"/>
    <rect x="-4" y="13" width="8" height="12" rx="3" fill="#2D3A5E"/>
    <circle cx="8" cy="12" r="3" fill="#2D3A5E" opacity="0.5"/>
    <rect x="4" y="16" width="8" height="10" rx="3" fill="#2D3A5E" opacity="0.5"/>

    <text x="0" y="52" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5A5A5A">나오시마 인구</text>
    <text x="0" y="78" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="bold" fill="#2D3A5E">~3,100</text>
    <text x="0" y="94" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5A5A5A">명</text>
    <rect x="-55" y="102" width="110" height="32" rx="6" fill="#2D3A5E" opacity="0.06"/>
    <text x="0" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5A5A5A">섬에 교회 1곳</text>
    <text x="0" y="129" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5A5A5A">기도의 동역이 필요한 곳</text>
  </g>

  <!-- Bottom note -->
  <line x1="20" y1="448" x2="340" y2="448" stroke="#E8E4E0" stroke-width="1"/>
  <text x="180" y="468" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5A5A5A" font-style="italic">복음은 이 땅에도 닿아야 합니다</text>
</svg>
