<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img">
  <title>4월 나오시마 날씨 안내</title>
  <desc>4월 중하순 나오시마의 날씨 정보. 기온 10~20도, 벚꽃에서 신록으로 전환되는 시기이며 골든위크 전 한산한 방문 적기입니다.</desc>

  <rect width="400" height="200" fill="#FFF5F3" rx="8"/>

  <!-- Section 1: Temperature (left) -->
  <g transform="translate(60,30)">
    <!-- Thermometer -->
    <rect x="-4" y="0" width="8" height="70" rx="4" fill="#E8E4E0" stroke="#C4B89C" stroke-width="1"/>
    <circle cx="0" cy="75" r="10" fill="#E8E4E0" stroke="#C4B89C" stroke-width="1"/>
    <!-- Mercury fill -->
    <rect x="-2" y="20" width="4" height="50" rx="2" fill="#E07B5A"/>
    <circle cx="0" cy="75" r="7" fill="#E07B5A"/>
    <!-- Temperature marks -->
    <line x1="6" y1="15" x2="14" y2="15" stroke="#C4B89C" stroke-width="1"/>
    <text x="18" y="19" font-family="sans-serif" font-size="9" fill="#5A5A5A">20°C</text>
    <line x1="6" y1="35" x2="14" y2="35" stroke="#C4B89C" stroke-width="1"/>
    <text x="18" y="39" font-family="sans-serif" font-size="9" fill="#5A5A5A">15°C</text>
    <line x1="6" y1="55" x2="14" y2="55" stroke="#C4B89C" stroke-width="1"/>
    <text x="18" y="59" font-family="sans-serif" font-size="9" fill="#5A5A5A">10°C</text>

    <text x="0" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5A5A5A">기온</text>
    <text x="0" y="115" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1A1A1A">10~20°C</text>
    <text x="0" y="130" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5A5A5A">온화한 해양성 기후</text>
  </g>

  <!-- Section 2: Season transition (center) -->
  <g transform="translate(185,30)">
    <!-- Cherry blossom -->
    <g transform="translate(-20,15)">
      <circle cx="0" cy="0" r="4" fill="#F8C8D4" opacity="0.8"/>
      <circle cx="0" cy="-6" r="3" fill="#F8C8D4" opacity="0.6"/>
      <circle cx="5.5" cy="-2" r="3" fill="#F8C8D4" opacity="0.6"/>
      <circle cx="3.5" cy="4.5" r="3" fill="#F8C8D4" opacity="0.6"/>
      <circle cx="-3.5" cy="4.5" r="3" fill="#F8C8D4" opacity="0.6"/>
      <circle cx="-5.5" cy="-2" r="3" fill="#F8C8D4" opacity="0.6"/>
      <circle cx="0" cy="0" r="2" fill="#E8637A"/>
    </g>
    <text x="-20" y="35" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5A5A5A">벚꽃</text>

    <!-- Arrow -->
    <line x1="0" y1="18" x2="22" y2="18" stroke="#C4B89C" stroke-width="1.5" marker-end="url(#arrowgrey)"/>

    <!-- Fresh green leaves -->
    <g transform="translate(40,12)">
      <ellipse cx="-4" cy="-3" rx="6" ry="10" fill="#8BC34A" opacity="0.7" transform="rotate(-20,-4,-3)"/>
      <ellipse cx="4" cy="-3" rx="6" ry="10" fill="#6AAF2A" opacity="0.7" transform="rotate(20,4,-3)"/>
      <line x1="0" y1="7" x2="0" y2="15" stroke="#5A8F4A" stroke-width="1.5"/>
    </g>
    <text x="40" y="35" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5A5A5A">신록</text>

    <text x="10" y="58" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2D3A5E">벚꽃 → 신록 전환기</text>
    <text x="10" y="75" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5A5A5A">콘크리트 건축과 초록의</text>
    <text x="10" y="88" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5A5A5A">아름다운 대비</text>

    <!-- Sun & cloud -->
    <g transform="translate(-8,100)">
      <circle cx="0" cy="0" r="10" fill="#E8637A" opacity="0.3"/>
      <circle cx="0" cy="0" r="6" fill="#E8637A"/>
      <!-- Rays -->
      <g stroke="#E8637A" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
        <line x1="0" y1="-12" x2="0" y2="-15"/>
        <line x1="10" y1="-6" x2="13" y2="-8"/>
        <line x1="12" y1="0" x2="15" y2="0"/>
        <line x1="-10" y1="-6" x2="-13" y2="-8"/>
        <line x1="-12" y1="0" x2="-15" y2="0"/>
      </g>
      <!-- Cloud partially covering -->
      <ellipse cx="12" cy="4" rx="10" ry="6" fill="#E8E4E0" opacity="0.9"/>
      <ellipse cx="8" cy="0" rx="7" ry="5" fill="#E8E4E0" opacity="0.9"/>
    </g>
    <text x="10" y="125" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5A5A5A">맑음 / 간헐적 봄비</text>
    <text x="10" y="138" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5A5A5A">얇은 겉옷 + 우산 준비</text>
  </g>

  <!-- Section 3: Golden week badge (right) -->
  <g transform="translate(340,55)">
    <!-- Badge shape -->
    <rect x="-45" y="-20" width="90" height="55" rx="10" fill="#2D3A5E" opacity="0.9"/>
    <text x="0" y="-2" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#E8637A" font-weight="bold">골든위크 전</text>
    <text x="0" y="16" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#FFF5F3" font-weight="bold">한산한 시기</text>
    <text x="0" y="28" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#FFF5F3" opacity="0.7">4월 29일 전 여유 관람</text>
  </g>

  <!-- Practical tips at bottom right -->
  <g transform="translate(340,130)">
    <rect x="-45" y="0" width="90" height="50" rx="6" fill="#E8637A" opacity="0.1"/>
    <text x="0" y="16" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5A5A5A">지중미술관</text>
    <text x="0" y="30" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#D4A000">사전예약 필수</text>
    <text x="0" y="43" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#5A5A5A">봄빛이 모네 작품을 살려줌</text>
  </g>

  <defs>
    <marker id="arrowgrey" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0,0 6,2 0,4" fill="#C4B89C"/>
    </marker>
  </defs>
</svg>