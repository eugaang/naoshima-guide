<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700" role="img">
  <title>나오시마 변천사 타임라인</title>
  <desc>1917년 제련소 가동부터 2010년 세토우치 예술제까지, 나오시마가 산업폐기물 섬에서 예술의 섬으로 변모한 과정을 보여주는 연대표입니다.</desc>
  <defs>
    <linearGradient id="tl-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8E4E0"/>
      <stop offset="40%" stop-color="#EDEAE5"/>
      <stop offset="100%" stop-color="#FFF5F3"/>
    </linearGradient>
    <linearGradient id="tl-line" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#888888"/>
      <stop offset="50%" stop-color="#6B8E5A"/>
      <stop offset="100%" stop-color="#2D3A5E"/>
    </linearGradient>
  </defs>

  <rect width="400" height="700" fill="url(#tl-bg)" rx="8"/>

  <!-- Title -->
  <text x="200" y="45" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1A1A1A">산업폐기물 섬에서 예술의 섬으로</text>
  <text x="200" y="65" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5A5A5A">나오시마의 변천사</text>

  <!-- Vertical timeline line -->
  <line x1="140" y1="95" x2="140" y2="650" stroke="url(#tl-line)" stroke-width="3" stroke-linecap="round"/>

  <!-- 1917 — 제련소 가동 -->
  <g transform="translate(0,120)">
    <!-- Circle marker -->
    <circle cx="140" cy="0" r="12" fill="#888888" stroke="#FFF5F3" stroke-width="2.5"/>
    <!-- Factory icon -->
    <rect x="133" y="-6" width="5" height="10" fill="#FFF5F3" rx="1"/>
    <rect x="141" y="-8" width="5" height="12" fill="#FFF5F3" rx="1"/>
    <path d="M136,-6 L136,-10 L138,-8" fill="#FFF5F3"/>
    <!-- Year -->
    <text x="90" y="5" text-anchor="end" font-family="sans-serif" font-size="20" font-weight="bold" fill="#888888">1917</text>
    <!-- Description -->
    <text x="170" y="-3" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1A1A1A">제련소 가동</text>
    <text x="170" y="15" font-family="sans-serif" font-size="11" fill="#5A5A5A">미쓰비시 금속광업 나오시마 제련소</text>
    <text x="170" y="30" font-family="sans-serif" font-size="11" fill="#5A5A5A">산업의 섬, 환경오염의 시작</text>
  </g>

  <!-- 1985 — 후쿠타케의 구상 -->
  <g transform="translate(0,225)">
    <circle cx="140" cy="0" r="12" fill="#7D9B6A" stroke="#FFF5F3" stroke-width="2.5"/>
    <!-- Sprout icon -->
    <path d="M140,4 L140,-4" stroke="#FFF5F3" stroke-width="2" stroke-linecap="round"/>
    <path d="M140,-4 C136,-8 134,-6 136,-2" stroke="#FFF5F3" stroke-width="1.5" fill="none"/>
    <path d="M140,-4 C144,-8 146,-6 144,-2" stroke="#FFF5F3" stroke-width="1.5" fill="none"/>
    <text x="90" y="5" text-anchor="end" font-family="sans-serif" font-size="20" font-weight="bold" fill="#7D9B6A">1985</text>
    <text x="170" y="-3" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1A1A1A">후쿠타케의 구상</text>
    <text x="170" y="15" font-family="sans-serif" font-size="11" fill="#5A5A5A">아버지의 뜻을 이어받아</text>
    <text x="170" y="30" font-family="sans-serif" font-size="11" fill="#5A5A5A">예술과 자연이 공존하는 섬을 꿈꾸다</text>
  </g>

  <!-- 1992 — 베네세하우스 개관 -->
  <g transform="translate(0,330)">
    <circle cx="140" cy="0" r="12" fill="#5A8F4A" stroke="#FFF5F3" stroke-width="2.5"/>
    <!-- Building icon -->
    <rect x="134" y="-5" width="12" height="9" fill="#FFF5F3" rx="1"/>
    <polygon points="134,-5 140,-10 146,-5" fill="#FFF5F3"/>
    <text x="90" y="5" text-anchor="end" font-family="sans-serif" font-size="20" font-weight="bold" fill="#5A8F4A">1992</text>
    <text x="170" y="-3" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1A1A1A">베네세하우스 개관</text>
    <text x="170" y="15" font-family="sans-serif" font-size="11" fill="#5A5A5A">안도 타다오 설계</text>
    <text x="170" y="30" font-family="sans-serif" font-size="11" fill="#5A5A5A">미술관과 호텔이 결합된 혁신 시설</text>
  </g>

  <!-- 1994 — 노란 호박 설치 -->
  <g transform="translate(0,430)">
    <circle cx="140" cy="0" r="12" fill="#E8637A" stroke="#FFF5F3" stroke-width="2.5"/>
    <!-- Pumpkin icon (simplified) -->
    <ellipse cx="140" cy="0" rx="5" ry="6" fill="#FFF5F3"/>
    <line x1="140" y1="-6" x2="140" y2="-4" stroke="#E8637A" stroke-width="1.5" stroke-linecap="round"/>
    <text x="90" y="5" text-anchor="end" font-family="sans-serif" font-size="20" font-weight="bold" fill="#D4A000">1994</text>
    <text x="170" y="-3" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1A1A1A">노란 호박 설치</text>
    <text x="170" y="15" font-family="sans-serif" font-size="11" fill="#5A5A5A">쿠사마 야요이의 상징적 작품</text>
    <text x="170" y="30" font-family="sans-serif" font-size="11" fill="#5A5A5A">나오시마의 아이콘이 되다</text>
  </g>

  <!-- 2004 — 지중미술관 개관 -->
  <g transform="translate(0,530)">
    <circle cx="140" cy="0" r="12" fill="#3A7D2E" stroke="#FFF5F3" stroke-width="2.5"/>
    <!-- Underground building icon -->
    <rect x="133" y="-3" width="14" height="7" fill="#FFF5F3" rx="1"/>
    <line x1="133" y1="-3" x2="147" y2="-3" stroke="#FFF5F3" stroke-width="2"/>
    <rect x="136" y="-1" width="3" height="3" fill="#3A7D2E" rx="0.5"/>
    <rect x="141" y="-1" width="3" height="3" fill="#3A7D2E" rx="0.5"/>
    <text x="90" y="5" text-anchor="end" font-family="sans-serif" font-size="20" font-weight="bold" fill="#3A7D2E">2004</text>
    <text x="170" y="-3" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1A1A1A">지중미술관 개관</text>
    <text x="170" y="15" font-family="sans-serif" font-size="11" fill="#5A5A5A">안도 타다오 설계, 건물 전체를 지하에</text>
    <text x="170" y="30" font-family="sans-serif" font-size="11" fill="#5A5A5A">모네 · 터렐 · 드 마리아 상설 전시</text>
  </g>

  <!-- 2010 — 세토우치 예술제 -->
  <g transform="translate(0,630)">
    <circle cx="140" cy="0" r="14" fill="#2D3A5E" stroke="#E8637A" stroke-width="2.5"/>
    <!-- Star/celebration icon -->
    <polygon points="140,-6 142,-2 146,-2 143,1 144,5 140,3 136,5 137,1 134,-2 138,-2" fill="#E8637A"/>
    <text x="90" y="5" text-anchor="end" font-family="sans-serif" font-size="20" font-weight="bold" fill="#2D3A5E">2010</text>
    <text x="170" y="-3" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1A1A1A">세토우치 예술제</text>
    <text x="170" y="15" font-family="sans-serif" font-size="11" fill="#5A5A5A">세계적 예술 축제의 무대</text>
    <text x="170" y="30" font-family="sans-serif" font-size="11" fill="#5A5A5A">연간 수십만 명이 찾는 예술의 섬으로</text>
  </g>
</svg>